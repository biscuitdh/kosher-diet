      <feColorMatrix type="saturate" values=".12"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .12"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
  </defs>
