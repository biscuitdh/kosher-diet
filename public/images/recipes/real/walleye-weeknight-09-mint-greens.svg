<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-label="walleye fillets with weeknight grains">
  <defs>
    <radialGradient id="plate-glow" cx="50%" cy="46%" r="62%">
      <stop offset="0" stop-color="#fffdf4"/>
      <stop offset="1" stop-color="#fff8ea"/>
    </radialGradient>
    <linearGradient id="table" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3eee2"/>
      <stop offset="1" stop-color="#d8c7ab"/>
    </linearGradient>
    <filter id="soft-shadow" x="-25%" y="-25%" width="150%" height="150%">
