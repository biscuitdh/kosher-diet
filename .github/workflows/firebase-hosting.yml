name: Firebase Hosting

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: firebase-hosting-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  FIREBASE_PROJECT_ID: koshertable-prod
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: koshertable-prod
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: koshertable-prod.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
  NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}

jobs:
  verify-and-deploy:
    name: Verify and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Firebase build variables
        run: |
          test -n "$NEXT_PUBLIC_FIREBASE_API_KEY" || (echo "::error::Missing NEXT_PUBLIC_FIREBASE_API_KEY repository variable" && exit 1)
          test -n "$NEXT_PUBLIC_FIREBASE_APP_ID" || (echo "::error::Missing NEXT_PUBLIC_FIREBASE_APP_ID repository variable" && exit 1)
          test -n "$NEXT_PUBLIC_GOOGLE_CLIENT_ID" || (echo "::error::Missing NEXT_PUBLIC_GOOGLE_CLIENT_ID repository variable" && exit 1)

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Check recipe images
        run: npm run images:check

      - name: Build Firebase static export
        run: npm run build:firebase

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          access_token_lifetime: 900s

      - name: Deploy preview channel
        if: github.event_name == 'pull_request'
        run: npx firebase-tools@latest hosting:channel:deploy "pr-${{ github.event.pull_request.number }}" --project "$FIREBASE_PROJECT_ID" --expires 7d --non-interactive

      - name: Deploy live
        if: github.event_name == 'push'
        run: npx firebase-tools@latest deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive
