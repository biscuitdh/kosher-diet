      <stop offset="1" stop-color="#fff9ec"/>
    </radialGradient>
    <linearGradient id="table" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1eadf"/>
      <stop offset="1" stop-color="#d7bf9f"/>
    </linearGradient>
    <filter id="soft-shadow" x="-25%" y="-25%" width="150%" height="150%">
