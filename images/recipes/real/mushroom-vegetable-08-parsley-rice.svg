      <stop offset="1" stop-color="#fff9ec"/>
    </radialGradient>
    <linearGradient id="table" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef0dc"/>
      <stop offset="1" stop-color="#c2c29a"/>
