services:
  web-dev:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    tmpfs:
      - /app/.next

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NEXT_TELEMETRY_DISABLED: "1"

volumes:
  node_modules:
